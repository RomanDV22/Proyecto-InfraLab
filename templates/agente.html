<!DOCTYPE html>

<html>

<head>

    <title>InfraLab Agent</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>

        body {

            background: #111;

            color: white;

            font-family: Arial;

            padding: 30px;

        }


        .chart-container {

            width: 900px;

            height: 300px;

            margin-bottom: 40px;

        }

	.stats {

    	    display: flex;

      	    gap: 20px;

    	    margin-bottom: 40px;
	}

	.card {

    	    background: #222;

    	    padding: 20px;

    	    border-radius: 10px;

    	    width: 200px;

    	    text-align: center;

	}

    </style>

</head>

<body>

    <h1>{{ servidor }}</h1>

    <div class="stats">

    	<div class="card">

            <h2>CPU</h2>

            <p>{{ ultima_cpu }}%</p>

    	</div>


    	<div class="card">

            <h2>RAM</h2>

       	    <p>{{ ultima_ram }}%</p>

    	</div>


    	<div class="card">

            <h2>IP</h2>

            <p>{{ ultima_ip }}</p>

    	</div>

    </div>

    <div class="chart-container">

        <canvas id="cpuChart"></canvas>

    </div>


    <div class="chart-container">

        <canvas id="ramChart"></canvas>

    </div>


    <script>

        new Chart(

            document.getElementById("cpuChart"),

            {

                type: "line",

                data: {

                    labels: {{ timestamps | tojson }},

                    datasets: [{

                        label: "CPU %",

                        data: {{ cpu | tojson }}

                    }]

                }

            }

        )


        new Chart(

            document.getElementById("ramChart"),

            {

                type: "line",

                data: {

                    labels: {{ timestamps | tojson }},

                    datasets: [{

                        label: "RAM %",

                        data: {{ ram | tojson }}

                    }]

                }

            }

        )

    </script>

</body>

</html>
